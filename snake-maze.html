<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蛇追人 - 60秒逃回家</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
        }
        h1 { margin-bottom: 10px; color: #e94560; }
        #game-container {
            position: relative;
            background: #16213e;
            border: 3px solid #0f3460;
            border-radius: 10px;
            padding: 10px;
        }
        canvas {
            display: block;
            border-radius: 5px;
            background: #0f3460;
        }
        #info {
            margin-top: 15px;
            display: flex;
            gap: 30px;
            font-size: 18px;
        }
        #timer { color: #ffd700; }
        .controls { margin-top: 15px; color: #888; font-size: 14px; }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 30px 50px;
            border-radius: 15px;
            text-align: center;
            display: none;
            z-index: 10;
        }
        #message.win h2 { color: #4ecca3; }
        #message.lose h2 { color: #e94560; }
        #message button {
            margin-top: 15px;
            padding: 10px 25px;
            background: #e94560;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🐍 蛇追人 - 60秒逃回家！</h1>
    <div id="game-container">
        <canvas id="game" width="600" height="400"></canvas>
        <div id="message">
            <h2 id="msg-title"></h2>
            <p id="msg-text"></p>
            <button onclick="restart()">再玩一次</button>
        </div>
    </div>
    <div id="info">
        <div>剩餘: <span id="timer">60</span> 秒</div>
    </div>
    <div class="controls">方向鍵/WASD 移動 | 目標：藍色房子 | 小心蛇！</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const cellSize = 20;
        const cols = canvas.width / cellSize;
        const rows = canvas.height / cellSize;
        
        let player, snake, house;
        let timeLeft = 60;
        let gameOver = false;
        let timerInterval;
        let snakeInterval;
        
        function init() {
            player = { x: 1, y: Math.floor(rows / 2) };
            house = { x: cols - 2, y: rows - 2 };
            snake = { x: cols - 2, y: Math.floor(rows / 2), body: [] };
            
            for (let i = 0; i < 4; i++) {
                snake.body.push({ x: cols - 2 - i, y: Math.floor(rows / 2) });
            }
            snake.x = snake.body[0].x;
            snake.y = snake.body[0].y;
        }
        
        function draw() {
            ctx.fillStyle = '#0f3460';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let x = 0; x < cols; x++) {
                for (let y = 0; y < rows; y++) {
                    if (Math.random() > 0.98) {
                        ctx.fillStyle = '#1b4965';
                        ctx.beginPath();
                        ctx.arc(x * cellSize + cellSize/2, y * cellSize + cellSize/2, cellSize/3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
            
            ctx.fillStyle = '#3498db';
            ctx.fillRect(house.x * cellSize + 2, house.y * cellSize + 2, cellSize - 4, cellSize - 4);
            ctx.fillStyle = '#fff';
            ctx.fillRect(house.x * cellSize + 6, house.y * cellSize + 6, cellSize - 12, cellSize - 12);
            
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(player.x * cellSize + cellSize/2, player.y * cellSize + cellSize/2, cellSize/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            
            for (let i = snake.body.length - 1; i >= 0; i--) {
                const seg = snake.body[i];
                ctx.fillStyle = i === 0 ? '#e74c3c' : '#c0392b';
                ctx.beginPath();
                ctx.arc(seg.x * cellSize + cellSize/2, seg.y * cellSize + cellSize/2, cellSize/2 - 2, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 14px Arial';
            ctx.fillText('🏃', player.x * cellSize, player.y * cellSize + 15);
            ctx.fillText('🐍', snake.body[0].x * cellSize, snake.body[0].y * cellSize + 15);
        }
        
        function movePlayer(dx, dy) {
            if (gameOver) return;
            
            const newX = player.x + dx;
            const newY = player.y + dy;
            
            if (newX >= 0 && newX < cols && newY >= 0 && newY < rows) {
                player.x = newX;
                player.y = newY;
                draw();
                
                if (player.x === house.x && player.y === house.y) win();
            }
        }
        
        function moveSnake() {
            if (gameOver) return;
            
            let dx = player.x - snake.x;
            let dy = player.y - snake.y;
            let moveX = 0, moveY = 0;
            
            if (Math.abs(dx) >= Math.abs(dy)) {
                moveX = dx > 0 ? 1 : -1;
                moveY = 0;
            } else {
                moveX = 0;
                moveY = dy > 0 ? 1 : -1;
            }
            
            const newX = snake.x + moveX;
            const newY = snake.y + moveY;
            
            if (newX >= 0 && newX < cols && newY >= 0 && newY < rows) {
                for (let seg of snake.body) {
                    if (seg.x === newX && seg.y === newY) return;
                }
                
                snake.body.unshift({ x: newX, y: newY });
                snake.body.pop();
                snake.x = newX;
                snake.y = newY;
                draw();
                
                if (snake.x === player.x && snake.y === player.y) lose();
            }
        }
        
        function checkCollision() {
            for (let seg of snake.body) {
                if (seg.x === player.x && seg.y === player.y) {
                    lose();
                    return;
                }
            }
        }
        
        function win() {
            gameOver = true;
            clearInterval(timerInterval);
            clearInterval(snakeInterval);
            document.getElementById('msg-title').textContent = '🎉 成功回家！';
            document.getElementById('msg-text').textContent = `用時 ${60 - timeLeft} 秒`;
            document.getElementById('message').className = 'win';
            document.getElementById('message').style.display = 'block';
        }
        
        function lose() {
            gameOver = true;
            clearInterval(timerInterval);
            clearInterval(snakeInterval);
            document.getElementById('msg-title').textContent = '🐍 被蛇抓住了！';
            document.getElementById('msg-text').textContent = `剩下 ${timeLeft} 秒`;
            document.getElementById('message').className = 'lose';
            document.getElementById('message').style.display = 'block';
        }
        
        function restart() {
            document.getElementById('message').style.display = 'none';
            timeLeft = 60;
            gameOver = false;
            document.getElementById('timer').textContent = '60';
            
            init();
            draw();
            
            clearInterval(timerInterval);
            clearInterval(snakeInterval);
            
            timerInterval = setInterval(() => {
                if (!gameOver) {
                    timeLeft--;
                    document.getElementById('timer').textContent = timeLeft;
                    if (timeLeft <= 0) {
                        gameOver = true;
                        clearInterval(snakeInterval);
                        document.getElementById('msg-title').textContent = '⏰ 時間到！';
                        document.getElementById('msg-text').textContent = '來不及回家...';
                        document.getElementById('message').className = 'lose';
                        document.getElementById('message').style.display = 'block';
                    }
                }
            }, 1000);
            
            snakeInterval = setInterval(() => {
                if (!gameOver) {
                    moveSnake();
                    checkCollision();
                }
            }, 700);
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') movePlayer(0, -1);
            else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') movePlayer(1, 0);
            else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') movePlayer(0, 1);
            else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') movePlayer(-1, 0);
        });
        
        restart();
    </script>
</body>
</html>
